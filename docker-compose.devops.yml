networks:
  devops-network:
    driver: bridge

volumes:
  jenkins-data:
  sonarqube-data:
  sonarqube-extensions:
  sonarqube-logs:
  postgresql-data:
  prometheus-data:
  grafana-data:

services:
  # PostgreSQL for SonarQube
  postgresql:
    image: postgres:15-alpine
    container_name: postgresql
    networks:
      - devops-network
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonarqube
    volumes:
      - postgresql-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar"]
      interval: 10s
      timeout: 5s
      retries: 5

  # SonarQube
  sonarqube:
    image: sonarqube:lts-community
    container_name: sonarqube
    depends_on:
      postgresql:
        condition: service_healthy
    networks:
      - devops-network
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://postgresql:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    volumes:
      - sonarqube-data:/opt/sonarqube/data
      - sonarqube-extensions:/opt/sonarqube/extensions
      - sonarqube-logs:/opt/sonarqube/logs
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/api/system/status | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Jenkins
  jenkins:
    build:
      context: ./jenkins
    container_name: jenkins
    privileged: true
    user: root
    depends_on:
      sonarqube:
        condition: service_healthy
    networks:
      - devops-network
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
      - CASC_JENKINS_CONFIG=/var/jenkins_config/casc.yaml
      - SONARQUBE_TOKEN=${SONARQUBE_TOKEN:-admin}
      - PIPELINE_REPO_URL=${PIPELINE_REPO_URL:-https://github.com/Benjaminnnnnn/spring-petclinic.git}
      - PIPELINE_REPO_BRANCH=${PIPELINE_REPO_BRANCH:-main}
      - PRODUCTION_VM_HOST=${PRODUCTION_VM_HOST:-host.docker.internal}
      - PRODUCTION_VM_USER=${PRODUCTION_VM_USER:-deployer}
      - PRODUCTION_VM_SSH_PORT=${PRODUCTION_VM_SSH_PORT:-2222}
      - PRODUCTION_VM_APP_PORT=${PRODUCTION_VM_APP_PORT:-8080}
    ports:
      - "8081:8080"
      - "50000:50000"
    volumes:
      - jenkins-data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ./jenkins-config:/var/jenkins_config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/login || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    networks:
      - devops-network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/targets:/etc/prometheus/targets:ro
      - prometheus-data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    networks:
      - devops-network
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    ports:
      - "${GRAFANA_HOST_PORT:-3030}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Burp Suite Alternative - Using OWASP ZAP with Burp-compatible reporting
  # Note: Burp Suite Community Edition doesn't support headless/Docker deployment
  # Using ZAP as it provides similar functionality with better automation support
  burpsuite:
    image: zaproxy/zap-stable
    container_name: burpsuite
    networks:
      - devops-network
    command: zap.sh -daemon -host 0.0.0.0 -port 8090 -config api.addrs.addr.name=.* -config api.addrs.addr.regex=true -config api.key=burp-api-key
    ports:
      - "8090:8090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8090 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
