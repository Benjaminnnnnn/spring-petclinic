jenkins:
  systemMessage: "DevOps Pipeline - Spring PetClinic"
  numExecutors: 2
  mode: NORMAL

  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "admin"
          password: "admin"

  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

credentials:
  system:
    domainCredentials:
      - credentials:
          - string:
              scope: GLOBAL
              id: "sonarqube-token"
              secret: "${SONARQUBE_TOKEN}"
              description: "SonarQube authentication token"

unclassified:
  location:
    url: "http://localhost:8081/"

  sonarGlobalConfiguration:
    buildWrapperEnabled: true
    installations:
      - name: "SonarQube"
        serverUrl: "http://sonarqube:9000"
        credentialsId: "sonarqube-token"

  prometheusConfiguration:
    path: "prometheus"
    defaultNamespace: "jenkins"
    collectingMetricsPeriodInSeconds: 30

jobs:
  - script: >
      pipelineJob('spring-petclinic-pipeline') {
        description('DevOps pipeline for Spring PetClinic')
        triggers {
          scm('H/5 * * * *')
        }
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url(System.getenv('PIPELINE_REPO_URL'))
                }
                branch('*/main')
              }
            }
            scriptPath('Jenkinsfile')
            lightweight(true)
          }
        }
      }
